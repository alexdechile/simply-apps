<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Editor Markdown a Unicode Facebook (Mejorado)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container py-5">
    <h2 class="mb-4 text-center">Editor Markdown a Unicode Facebook</h2>
    <div class="row g-4">
      <div class="col-md-6">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <label for="markdown" class="form-label mb-0">Editor Markdown</label>
        </div>
        <div class="editor-controls">
          <button id="pegarBtn" class="copy-btn">Pegar</button>
          <button id="limpiarBtn" class="copy-btn">Limpiar</button>
          <div id="formatButtons" style="display: none;">
            <button id="boldBtn" class="copy-btn" tabindex="-1">Negritas **</button>
            <button id="italicBtn" class="copy-btn" tabindex="-1">Itálicas *</button>
          </div>
        </div>
        <div class="editor-container">
          <pre id="highlighter" class="highlighter-layer"></pre>
          <textarea id="markdown" class="editor" placeholder="Escribe o pega tu texto en Markdown aquí..." spellcheck="false"></textarea>
        </div>
      </div>
      <div class="col-md-6">
        <label for="output" class="form-label">Texto para Facebook</label>
        <button class="copy-btn mb-2 float-end" id="copyBtn">Copiar</button>
        <div id="output" class="output" tabindex="0" readonly></div>
      </div>
    </div>
    <div class="credit">
      Creado con ❤️ por <a href="https://github.com/alexdechile" target="_blank" rel="noopener noreferrer">alexdechile</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="script.js" defer></script>
</body>
</html>
